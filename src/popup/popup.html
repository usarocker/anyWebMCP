<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>anyWebMCP</title>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 18px;
      margin: 0;
    }
    .status {
      font-size: 12px;
      color: #666;
      margin-bottom: 15px;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #2196F3;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    button {
      width: 100%;
      padding: 10px;
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>anyWebMCP</h1>
  </div>
  
  <div class="status" id="page-status">
    Checking page...
  </div>

  <div class="toggle-container">
    <span>Enable Hijacking</span>
    <label class="switch">
      <input type="checkbox" id="global-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <button id="open-options">⚙️ Configuration Management</button>

  <script type="module" src="../../dist/popup/popup.js"></script>
</body>
</html>
